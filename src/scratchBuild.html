<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Building Site</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="home.css">
</head>

<body>
<!-- Top bar -->
<header id="topbar">
    <h2 id="menu-heading"><a href="/index.html">Menu</a></h2>
    <a href="index.html" id="site-title-link">
        <h1 id="site-title">Site Building Site</h1>
    </a>
    <h3 id="user-heading">Hi User!</h3>
</header>

<!-- Main canvas area -->
<main id="canvas"></main>

<!-- Bottom-left action buttons -->
<div id="bottom-left-buttons">
    <button id="preview-site-btn" class="action-button">Preview Site</button>
</div>

<div id="bottom-right-buttons">
    <button id="widget-drawer-btn" class="action-button">Widget Drawer</button>
    <button id="publish-site-btn" class="action-button">Publish Site</button>
</div>

<!-- Right-side widget drawer (was the left sidebar) -->
<aside id="sidebar" class="closed">
    <div class="sidebar-header">Elements</div>
    <button class="sidebar-button" data-type="0"></button>
    <button class="sidebar-button" data-type="1"></button>
    <button class="sidebar-button" data-type="2"></button>
    <button class="sidebar-button" data-type="3"></button>
    <button class="sidebar-button" data-type="4"></button>
    <button class="sidebar-button" data-type="5"></button>
</aside>

<script src="script.js"></script>
</body>

</html>
