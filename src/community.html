<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Community Asset Library</title>
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="community.css">
</head>
<body>

<!-- Top bar (matches index.html) -->
<header id="topbar">
    <h2 id="menu-heading"><a href="index.html">Menu</a></h2>
    <a href="index.html" id="site-title-link">
        <h1 id="site-title">Site Building Site</h1>
    </a>
    <h3 id="user-heading">Hi Person!</h3>
</header>

<main class="frame" aria-label="Community asset library">

    <section class="community-section" aria-labelledby="library-title">

        <h1 id="library-title" class="section-title">Community Asset Library</h1>

        <!-- ── Build Something New ── -->
        <h2 id="build-new-title" class="section-title">Build Something New</h2>

        <div class="build-new" aria-labelledby="build-new-title">
            <a href="widgetBuilder.html" class="circle-card circle-card--widget">
                <span class="circle-card__title">New Widget</span>
            </a>
            <a href="null" class="circle-card circle-card--template">
                <span class="circle-card__title">New Template</span>
            </a>
        </div>

        <!-- ── Browse Community Assets ── -->
        <h2 id="browse-title" class="section-title">Browse Community Assets</h2>

        <div class="browse-grid" aria-labelledby="browse-title">
            <article class="asset-card asset-card--yellow">
                <div class="asset-card__rect"></div>
                <span class="asset-card__name">Name</span>
            </article>
            <article class="asset-card asset-card--pink">
                <div class="asset-card__rect"></div>
                <span class="asset-card__name">Name</span>
            </article>
            <article class="asset-card asset-card--blue asset-card--center">
                <div class="asset-card__rect"></div>
                <span class="asset-card__name">Name</span>
            </article>
            <article class="asset-card asset-card--pink">
                <div class="asset-card__rect"></div>
                <span class="asset-card__name">Name</span>
            </article>
            <article class="asset-card asset-card--yellow">
                <div class="asset-card__rect"></div>
                <span class="asset-card__name">Name</span>
            </article>
        </div>

        <!-- Decorative dots scattered throughout -->
        <span class="dot dot--yellow dot-1"  aria-hidden="true"></span>
        <span class="dot dot--blue   dot-2"  aria-hidden="true"></span>
        <span class="dot dot--pink   dot-3"  aria-hidden="true"></span>
        <span class="dot dot--blue   dot-4"  aria-hidden="true"></span>
        <span class="dot dot--pink   dot-5"  aria-hidden="true"></span>
        <span class="dot dot--yellow dot-6"  aria-hidden="true"></span>
        <span class="dot dot--blue   dot-7"  aria-hidden="true"></span>
        <span class="dot dot--yellow dot-8"  aria-hidden="true"></span>
        <span class="dot dot--pink   dot-9"  aria-hidden="true"></span>
    </section>
</main>

</body>
</html>
